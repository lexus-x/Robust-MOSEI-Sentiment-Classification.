data:
  data_path: /path/to/mosei_raw.pkl
  batch_size: 32
  num_workers: 0
  max_seq_len: null
  lower_threshold: -0.5
  upper_threshold: 0.5
  conditions:
    - clean
    - missing_audio
    - missing_vision
    - missing_audio_vision
    - mild_jitter
training:
  learning_rate: 1.0e-4
  weight_decay: 1.0e-2
  max_epochs: 20
  patience: 3
  gradient_clip: 1.0
  seeds: [13, 17, 23]
